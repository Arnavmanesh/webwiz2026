<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Gymify </title>

    <!-- SEO -->
    <meta 
      name="description" 
      content="Gymify is an AI-powered fitness platform that turns workouts into a game. Track reps, earn XP, compete on leaderboards, and level up your fitness." 
    />
    <meta name="keywords" content="fitness app, gamified fitness, workout tracker, AI fitness, gym leaderboard, XP workout" />
    <meta name="author" content="Gymify" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.webp" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (for WhatsApp, LinkedIn, etc.) -->
    <meta property="og:title" content="Gymify | Level Up Your Fitness" />
    <meta 
      property="og:description" 
      content="Turn your workouts into a game. Earn XP, track progress, and compete with others using AI-powered fitness." 
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gymify | Level Up Your Fitness" />
    <meta 
      name="twitter:description" 
      content="AI-powered gamified fitness with XP, tracking, and leaderboards." 
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme Color (mobile browsers) -->
    <meta name="theme-color" content="#00e5ff" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
